name: Publish GHCR images

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Image tag (e.g. latest, demo-2026-05-19)
        required: true
        default: latest
  push:
    branches:
      - main
      - master
    paths:
      - backend/**
      - frontend/**
      - shared/**
      - backend/Dockerfile
      - frontend/Dockerfile
      - docker-compose.prod.yml
      - .github/workflows/publish-ghcr.yml

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lowercase registry owner
        shell: bash
        run: |
          owner="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          echo "OWNER=${owner}" >> "$GITHUB_ENV"
          echo "BACKEND_IMAGE=ghcr.io/${owner}/safeprompt-guard-v3-backend" >> "$GITHUB_ENV"
          echo "FRONTEND_IMAGE=ghcr.io/${owner}/safeprompt-guard-v3-frontend" >> "$GITHUB_ENV"

      - name: Set image tag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.tag }}
            ${{ env.BACKEND_IMAGE }}:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.tag }}
            ${{ env.FRONTEND_IMAGE }}:latest

      - name: Summary
        run: |
          echo "### Images published" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.tag }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.tag }}\`" >> "$GITHUB_STEP_SUMMARY"
