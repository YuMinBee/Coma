# 오프라인 번들용: 사전에 docker load 된 이미지를 pull 없이 실행
# 사용: scripts/start-offline.bat 또는 ./scripts/start-offline.sh

services:
  backend:
    image: ${SAFE_PROMPT_BACKEND_IMAGE}
    pull_policy: never
    ports:
      - "${BACKEND_PORT:-8001}:8001"
    environment:
      OLLAMA_BASE: ${OLLAMA_BASE:-http://host.docker.internal:11434}
      GEMMA_MODEL: ${GEMMA_MODEL:-gemma2:2b}
      SAFE_PROMPT_DB_PATH: /data/safeprompt.db
    volumes:
      - safeprompt-data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  frontend:
    image: ${SAFE_PROMPT_FRONTEND_IMAGE}
    pull_policy: never
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  safeprompt-data:
